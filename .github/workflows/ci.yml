name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Configure GitHub Packages auth
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github-packages</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Run tests
        run: cd db-test && mvn clean verify

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: db-test/target/surefire-reports/

      - name: Delete existing package version (if exists)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION=$(cd db-test && mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          PACKAGE_NAME="com.upkdev.financetracker.finance-tracker-db-test"
          OWNER="upesh-karki"

          echo "Checking for existing version: $PACKAGE_VERSION"

          # Get all versions of the package
          VERSIONS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$OWNER/packages/maven/$PACKAGE_NAME/versions")

          # Find the version ID matching our version
          VERSION_ID=$(echo "$VERSIONS" | python3 -c "
          import sys, json
          versions = json.load(sys.stdin)
          if isinstance(versions, list):
              for v in versions:
                  if v.get('name') == '$PACKAGE_VERSION':
                      print(v['id'])
                      break
          " 2>/dev/null || true)

          if [ -n "$VERSION_ID" ]; then
            echo "Found existing version $PACKAGE_VERSION (id=$VERSION_ID) — deleting before redeploy"
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$OWNER/packages/maven/$PACKAGE_NAME/versions/$VERSION_ID")

            if [ "$HTTP_STATUS" = "204" ]; then
              echo "✅ Deleted version $PACKAGE_VERSION (HTTP $HTTP_STATUS)"
            else
              echo "⚠️  Delete returned HTTP $HTTP_STATUS — proceeding with deploy anyway"
            fi
          else
            echo "No existing version found — fresh deploy"
          fi

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd db-test && mvn deploy -DskipTests --no-transfer-progress
