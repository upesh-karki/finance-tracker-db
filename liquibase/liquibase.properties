# Liquibase connection config for local dev
# Production values come from environment variables / CI pipeline

changeLogFile=changelog/db.changelog-master.xml
url=jdbc:postgresql://localhost:5432/finance_tracker
username=finance_user
password=finance_pass
driver=org.postgresql.Driver

# ─── Audit / tracking ────────────────────────────────────────────────────────
# Store Liquibase tracking tables in dbutils schema instead of public.
# This keeps the audit trail separate from application schemas.
# changelog_audit is defined in dbutils/ddl/changelog_audit.sql
databaseChangeLogTableName=changelog_audit
databaseChangeLogLockTableName=databasechangeloglock
liquibaseSchemaName=dbutils
